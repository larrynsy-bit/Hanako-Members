<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TikTok Members</title>

<link rel="stylesheet" href="/static/style.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>


<body>


<div class="container">


   <div class="header">

    <div class="logo">
        TikTok Members
    </div>

    <button 
        id="searchButton"
        style="display:none;"
    >
        🔍
    </button>

</div>



    <!-- Добавление участника (только админ) -->

    <div id="userPanel">


        <div class="form-card">


            <h2>
                Добавить участника
            </h2>



            <input
                id="tiktok"
                type="text"
                placeholder="@nickname"
            >



            <input
                id="tiktokUrl"
                type="text"
                placeholder="Ссылка TikTok"
            >



            <button id="saveButton">

                Добавить

            </button>


        </div>


    </div>




    <!-- Админ панель -->

    <div id="adminPanel" style="display:none;">



        <div id="searchBox" class="search-box hidden">


            <input
                id="search"
                placeholder="Поиск..."
            >


        </div>




        <div class="count-box">

            <span id="count">
                0 участников
            </span>

        </div>




        <div id="users">

        </div>



    </div>



</div>


<script src="/static/app.js"></script>


</body>

</html>
